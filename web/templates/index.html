<!DOCTYPE html>
<html lang="ro" data-theme="light" data-a11y="normal" data-size="normal">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTM - Parcuri Logistice</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0056b3">
</head>
<body>

    <div class="a11y-dropdown">
        <button class="a11y-trigger-btn" onclick="toggleA11yMenu()">⚙️</button>
        <div id="a11y-menu-content" class="a11y-content">
            <button onclick="toggleTheme()">🌓 Schimbă Tema</button>
            <button onclick="toggleContrast()">👁️ Contrast Înalt</button>
            <button onclick="toggleFontSize()">🔍 Text Mare</button>
            <hr>
            <button onclick="changeLanguage('ro')">🇷🇴 Română</button>
            <button onclick="changeLanguage('en')">🇬🇧 English</button>
        </div>
    </div>

    <div class="container">
        
        <div id="login-screen" class="screen active">
            <h1 data-i18n="login_title">Autentificare GTM</h1>
            <div class="login-box">
                <label for="username" data-i18n="login_label">Utilizator / Cod Pontaj:</label>
                <input type="text" id="username" placeholder="ex: operator_gg sau manager_1" autocomplete="off">
                <button class="btn-login" onclick="handleLogin()" data-i18n="login_btn">Intră în cont</button>
            </div>
        </div>

        <div id="operator-screen" class="screen">
            <div class="header-section">
                <h2><span data-i18n="panel_field">Panou Teren:</span> <span id="op-name" class="user-badge"></span></h2>
                <button class="btn-logout" onclick="logout()" data-i18n="logout">Ieșire</button>
            </div>

            <div class="task-card">
                </div>
        </div>

        <div id="manager-screen" class="screen">
            <div class="header-section">
                <h2><span data-i18n="panel_manager">Consolă Management:</span> <span id="mgr-name" class="user-badge"></span></h2>
                <button class="btn-logout" onclick="logout()" data-i18n="logout">Ieșire</button>
            </div>

            <div class="manager-grid">
                <div class="dashboard-card">
                    <h3 data-i18n="menu_tasks">📊 Alocare Taskuri</h3>
                    <p>Panou administrativ pentru trimiterea ordinelor în teren.</p>
                </div>
                <div class="dashboard-card">
                    <h3 data-i18n="menu_fleet">🚚 Monitorizare Flotă</h3>
                    <p>Starea rampelor de descărcare și poziția camioanelor.</p>
                </div>
                <div class="dashboard-card">
                    <h3 data-i18n="menu_clock">⏱️ Pontaj Operatori</h3>
                    <p>Evidența activității logistice în timp real.</p>
                </div>
            </div>
        </div>

    </div>

    <script src="/static/js/a11y.js"></script>
    
    <script src="/static/js/auth.js"></script>
    
    <script src="/static/js/app.js"></script>
    
    <script src="/static/js/operator-tools.js"></script>
</body>
</html>
