<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GTM - O aplicație PWA rapidă și responsivă dezvoltată în Go.">
    <title>GTM App</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#007acc">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="a11y-dropdown">
        <button class="a11y-trigger-btn" onclick="toggleA11yMenu()">⚙️</button>
        <div id="a11y-menu-content" class="a11y-content">
            <button onclick="toggleTheme()">🌓 Schimbă Tema</button>
            <button onclick="toggleContrast()">👁️ Contrast Înalt</button>
            <button onclick="toggleFontSize()">🔍 Text Mare</button>
            <hr>
            <button onclick="changeLanguage('ro')">🇷🇴 Română</button>
            <button onclick="changeLanguage('en')">🇬🇧 English</button>
            <button onclick="changeLanguage('pt')">🇵🇹 Português</button>
            <button onclick="changeLanguage('es')">🇪🇸 Español</button>
            <button onclick="changeLanguage('fr')">🇫🇷 Français</button>
            <button onclick="changeLanguage('de')">🇩🇪 Deutsch</button>
            <button onclick="changeLanguage('ua')">🇺🇦 Українська</button>
            <button onclick="changeLanguage('pl')">🇵🇱 Polski</button>
            <button onclick="changeLanguage('ar')">🇸🇦 العربية</button>
            <button onclick="changeLanguage('zh')">🇨🇳 中文</button>
            <button onclick="changeLanguage('pa')">🇮🇳 ਪੰਜਾਬੀ</button>
        </div>  
    </div>

    <div class="container">
        <div id="login-screen" class="screen active">
            <div class="login-box">
                <h2 data-i18n="login_title">Autentificare GTM</h2>
                <p style="font-size: 0.9rem; color: #666;">Introdu ID-ul (ex: operator_gg) sau Codul de pontaj (manager_yoyoma)</p>
                <label for="username" data-i18n="login_label">Utilizator / Cod Pontaj:</label>
                <input type="text" id="username" placeholder="Ex: operator_gg sau manager_yoyoma">
                <button class="btn-action" onclick="handleLogin()" data-i18n="login_btn">Intră în cont</button>
            </div>
        </div>

        <div id="operator-screen" class="screen">
            <header style="margin-bottom: 20px;">
                <h1>Panou Teren: <span id="op-name"></span></h1>
                <button class="btn-logout" onclick="logout()">Ieșire</button>
            </header>
            <div class="operator-view">
                <div id="tasks-container">
                    </div>
            </div>
        </div>

        <div id="manager-screen" class="screen">
            <div class="header-section">
                <h2><span data-i18n="panel_manager">Consolă Management:</span> <span id="mgr-name" class="user-badge"></span></h2>
                <button class="btn-logout" onclick="logout()" data-i18n="logout">Ieșire</button>
            </div>

            <div class="manager-grid">
                <div class="dashboard-card" style="cursor: default;">
                    <h3 data-i18n="menu_fleet" style="margin-bottom: 15px;">🚚 Monitorizare Flotă</h3>
                    <div id="manager-fleet-container">
                        </div>
                </div>

                <div class="dashboard-card" style="cursor: default;">
                    <h3 data-i18n="menu_tasks" style="margin-bottom: 15px;">📊 Alocare Taskuri</h3>
                    <div id="manager-allocation-container">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/a11y.js"></script>
    <script src="/static/js/renderers.js"></script>
    <script src="/static/js/operator-tools.js"></script>
    <script src="/static/js/manager-tools.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
